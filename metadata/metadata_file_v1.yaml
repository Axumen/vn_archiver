metadata_version: 1

# File-focused metadata baseline for VN > Build > File workflows.
# This template is used when parsing/linking file metadata payloads.

required:
  - title
  - version
  - artifact_type

optional:
  - build_type
  - normalized_version
  - distribution_platform
  - platform
  - language
  - edition
  - base_artifact_sha256
  - base_artifact_filename
  - source_url
  - release_date
  - notes
  - change_note

# Example
# title: "Example VN"
# version: "1.0"
# build_type: "full"
# distribution_platform: "steam"
# language: "english"
# edition: "default"
# base_artifact_sha256: "0123abcd..."
# release_date: "2026-03-19"
# artifact_type: "patch"
# notes: "Standalone file metadata baseline."
