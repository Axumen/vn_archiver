metadata_version: 1

# =====================================
# REQUIRED FIELDS
# =====================================
required:
  # Work identity (required for build matching)
  - title
  - version

# =====================================
# OPTIONAL FIELDS
# =====================================
optional:
  # -------------------------------------
  # SERIES
  # -------------------------------------
  - series
  - series_description

  # -------------------------------------
  # VISUAL NOVEL (work-level)
  # -------------------------------------
  - aliases              # Alternative titles (Romaji/Japanese/etc.)
  - developer            # Comma-separated string or YAML list
  - publisher            # Comma-separated string or YAML list
  - release_status
  - content_rating
  - content_mode         # Suggested: sfw, nsfw, selectable, patchable, mixed, unknown
  - content_type         # Suggested: main_story, story_expansion, seasonal_event, april_fools, side_story, non_canon_special
  - description          # Work-level synopsis/description
  - source               # Source/store/origin URL
  - tags

  # -------------------------------------
  # BUILD (version-level)
  # -------------------------------------
  - build_type
  - distribution_model
  - distribution_platform
  - language
  - translator           # String, list, or language-keyed map
  - edition
  - original_release_date
  - release_date
  - engine
  - engine_version
  - target_platform

  # -------------------------------------
  # RELATIONSHIPS
  # -------------------------------------
  - parent_vn_title
  - relationship_type

  # -------------------------------------
  # MISC
  # -------------------------------------
  - notes
  - change_note          # Metadata revision note

# Multi-archive metadata block (optional)
archives:
  - filename:
    sha256:

# -------------------------------------
# EXAMPLES
# -------------------------------------

# Translator examples:
# translator: "Sekai Project"
# translator:
#   - "Alice"
#   - "Bob"
# translator:
#   english:
#     - "Alice"
#     - "Bob"
#   spanish:
#     - "Carlos"
#   japanese: "Original team"

# Developer/Publisher examples:
# developer: "Studio A, Studio B"
# developer:
#   - "Studio A"
#   - "Studio B"
# publisher: "Publisher X"

# Content mode examples:
# content_mode: "sfw"
# content_mode: "selectable"
