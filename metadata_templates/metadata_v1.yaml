metadata_version: 1

# =====================================
# REQUIRED FIELDS
# =====================================
required:
  # Visual Novel (Work Identity)
  - title
  - version

# =====================================
# OPTIONAL FIELDS
# =====================================
optional:

  # -------------------------------------
  # SERIES TABLE
  # -------------------------------------
  - series
  - series_description

  # -------------------------------------
  # VISUAL_NOVELS TABLE
  # -------------------------------------
  - aliases             # Added: List of alternative titles (e.g., Romaji, Japanese)
  - developer           # Comma-separated string or YAML list are both accepted
  - publisher           # Publisher (comma-separated string or YAML list accepted)
  - release_status
  - content_rating
  - description         # VN-level description
  - source              # VN/build source (URL/store/origin)
  - tags

  # -------------------------------------
  # BUILDS TABLE
  # -------------------------------------
  - build_type
  - distribution_model
  - distribution_platform
  - language
  - translator          # Fan-translation group, list of translators, or per-language map
  - edition
  - original_release_date
  - release_date
  - engine
  - engine_version
  - target_platform

  # -------------------------------------
  # CANON RELATIONSHIPS
  # -------------------------------------
  - parent_vn_title
  - relationship_type
  
  # -------------------------------------
  # MISC
  # -------------------------------------
  - notes
  - change_note         # Optional metadata revision note
  - base_archive_sha256 # Added: Useful for patches/append discs to link to the base game


# Multi-archive support (optional)
archives:
  - filename:
    sha256:


# Translator field examples:
# translator: "Sekai Project"
# translator:
#   - "Alice"
#   - "Bob"
# translator:
#   english:
#     - "Alice"
#     - "Bob"
#   spanish:
#     - "Carlos"
#   japanese: "Original team"

# Developer/Publisher examples:
# developer: "Studio A, Studio B"
# developer:
#   - "Studio A"
#   - "Studio B"
# publisher: "Publisher X"
